spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8088"

jwt:
  secret: ${JWT_SECRET:ticketflow-secret-key-must-be-at-least-32-chars-long!!}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
