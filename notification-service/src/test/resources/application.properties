# -------------------------------------------------------
# Test configuration — overrides production settings
# to avoid connecting to external services (RabbitMQ,
# Config Server, Eureka) during unit/integration tests.
# -------------------------------------------------------

# Disable Spring Cloud Config Server connection
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Eureka service discovery
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable RabbitMQ auto-configuration connection attempt
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
