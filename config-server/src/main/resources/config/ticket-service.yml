server:
  port: 8082

services:
  event-service:
    base-url: http://localhost:8081

spring:
  cloud:
    discovery:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  health:
    circuit-breakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics, refresh
  endpoint:
    health:
      show-details: always
